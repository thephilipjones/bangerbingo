name: Deploy Production

on:
  push:
    tags:
      - 'prod-*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Production tag to deploy — must match prod-YYYY-MM-DD-NN (e.g. prod-2026-04-13-01)'
        required: true

concurrency:
  group: deploy-prod
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    container:
      image: node:22
    steps:
      - uses: actions/checkout@v4

      - name: Install native build tools
        run: apt-get update && apt-get install -y python3 make g++

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Validate tag format
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          if [[ ! "$TAG" =~ ^prod-[0-9]{4}-[0-9]{2}-[0-9]{2}-[0-9]{2}$ ]]; then
            echo "Invalid tag format: '$TAG'. Expected prod-YYYY-MM-DD-NN (e.g. prod-2026-04-13-01)"
            exit 1
          fi

      - name: Deploy to production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 2222
          script: |
            TAG="${{ github.event.inputs.tag || github.ref_name }}"
            cd /srv/bangerbingo/prod && git fetch --tags && git checkout "$TAG" && docker compose up -d --build
