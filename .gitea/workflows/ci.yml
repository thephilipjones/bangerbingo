name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    container:
      image: node:22
    steps:
      - uses: https://github.com/actions/checkout@v4

      - name: Install native build tools
        run: apt-get update && apt-get install -y python3 make g++

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
