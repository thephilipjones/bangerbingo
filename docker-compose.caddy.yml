# NOTE: NOT ACTIVE — this file is an alternative to cloudflared tunnels.
# Current production setup uses cloudflared (see Ansible role) which handles
# TLS termination and routing directly to the app containers on localhost ports.
# Use this file instead if you switch to a VPS with direct port 80/443 exposure.
#
# Shared Caddy reverse proxy for dual-stack (staging + prod) on one LXC.
#
# Prerequisites:
#   docker network create bangerbingo-net
#   (uncomment the networks block in docker-compose.yml for each app stack)
#
# Usage:
#   docker compose -f docker-compose.caddy.yml up -d
#
# This Caddy instance routes by hostname to the correct upstream app container.
# Both app stacks (bb-staging, bb-prod) must be on the bangerbingo-net network.

services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile.multi:/etc/caddy/Caddyfile:ro
      - caddy-shared-data:/data
      - caddy-shared-config:/config
    networks:
      - bangerbingo-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:2019/config/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  caddy-shared-data:
  caddy-shared-config:

networks:
  bangerbingo-net:
    external: true
