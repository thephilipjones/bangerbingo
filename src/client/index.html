<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BangerBingo</title>

    <!-- Inline theme resolver — runs before paint to prevent FOUC flash on reload.
         Keep in sync with src/client/lib/theme.ts. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('bb-theme');
          var mode = stored === 'light' || stored === 'dark'
            ? stored
            : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          document.documentElement.setAttribute('data-theme', mode);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>

    <!-- Step 2 TEMP: Google Fonts CDN for locked pairing (Space Grotesk + JetBrains Mono).
         Remove once public/fonts/ woff2 subsets (task 1.1) are in place — @font-face uses
         local() so self-hosted wins automatically once the binaries land. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;700&display=swap"
    />

    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <meta name="theme-color" content="#EFEBE4" media="(prefers-color-scheme: light)" />
