services:
  app:
    build: .
    # No host ports — Caddy proxies to app:3000 on the internal Docker network
    env_file: .env
    environment:
      - DB_PATH=/data/bangerbingo.db
    volumes:
      - bangerbingo-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${PORT:-3000}/healthz | grep -q '\"ok\":true'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      - APP_DOMAIN=${APP_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:2019/config/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  bangerbingo-data:
  caddy_data:
  caddy_config:

# Dual-stack deployment (staging + prod on one LXC):
#
# 1. Create a shared network:  docker network create bangerbingo-net
# 2. Start shared Caddy:       docker compose -f docker-compose.caddy.yml up -d
# 3. Start staging:            docker compose -p bb-staging --env-file .env.staging up -d --build
# 4. Start prod:               docker compose -p bb-prod --env-file .env.prod up -d --build
#
# The -p flag gives each stack distinct volume prefixes (bb-staging_bangerbingo-data,
# bb-prod_bangerbingo-data, etc.) so data is fully isolated without any compose changes.
#
# To connect app containers to the shared Caddy network, uncomment the networks
# section below and remove the caddy service ports (Caddy from docker-compose.caddy.yml
# owns ports 80/443 instead).
#
# networks:
#   default:
#     name: bangerbingo-net
#     external: true
